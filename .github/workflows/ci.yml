name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.11", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: pip install -e .
      - name: Run the end-to-end verification suite
        run: python quick_verify.py
      - name: Self-conformance (reference collector must pass its own spec)
        run: |
          python -m agent_pulse.cli serve --port 8788 &
          for i in $(seq 1 30); do curl -sf http://127.0.0.1:8788/health && break; sleep 1; done
          python -m agent_pulse.cli conformance --url http://127.0.0.1:8788/api/events
