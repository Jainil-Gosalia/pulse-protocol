name: Publish to PyPI

# Publishes agent-pulse to PyPI when you publish a GitHub Release (or run
# this workflow manually). Uses PyPI Trusted Publishing (OIDC) — no API
# token is stored anywhere. One-time setup on PyPI:
#   PyPI → your account → Publishing → Add a pending publisher:
#     PyPI project name: agent-pulse
#     Owner:             Jainil-Gosalia
#     Repository:        pulse-protocol
#     Workflow name:     publish.yml
on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # required for Trusted Publishing (OIDC)
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build
        run: |
          python -m pip install --upgrade build
          python -m build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
